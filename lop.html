<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>HỆ THỐNG QUẢN LÝ LỚP</h1>
        </header>

        <div id="notification" class="notification"></div>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maLop" value="Mã: Tự động" readonly title="Mã lớp tự sinh">
                <input type="text" id="tenLop" placeholder="Tên Lớp (VD: CNTT-K22A)">
                <input type="text" id="maKhoa" placeholder="Mã Khoa (VD: CNTT)">
                <button onclick="handleClass()" class="btn-add" id="class-btn">Thêm Lớp</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã Lớp</th>
                        <th>Tên Lớp</th>
                        <th>Mã Khoa</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="class-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-dialog">
            <div id="confirm-message" class="confirm-message"></div>
            <div class="confirm-actions">
                <button id="confirm-ok" class="btn-add">OK</button>
                <button id="confirm-cancel" class="btn-delete">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const API = `${API_BASE}/lop`;
        let classData = [];
        let editingMa = null;

        function renderClassTable() {
            const tableBody = document.getElementById('class-table-body');
            tableBody.innerHTML = classData.map((lop, index) => `
                <tr>
                    <td><strong>${lop.MaLop}</strong></td>
                    <td>${lop.TenLop}</td>
                    <td>${lop.Khoa}</td>
                    <td>
                        <button onclick="editClass('${lop.MaLop}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteClass('${lop.MaLop}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadClasses() {
            try {
                const res = await fetch(`${API_BASE}/lop`);
                const data = await res.json();
                classData = data.map(row => ({
                    MaLop: row.malop,
                    Khoa: row.khoa,
                    TenLop: row.tenlop
                }));
                renderClassTable();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu lớp:', error);
            }
        }

        async function handleClass() {
            const khoa = document.getElementById('maKhoa').value;
            const tenLop = document.getElementById('tenLop').value;

            if (!khoa || !tenLop) return alert("Vui lòng nhập đầy đủ Khóa và Tên lớp!");

            const action = editingMa ? 'cập nhật' : 'thêm mới';
            if (!await confirmAction(`Bạn có chắc chắn muốn ${action} lớp học này?`)) return;

            const body = {
                Khoa: khoa,
                TenLop: tenLop
            };

            try {
                const res = await fetch(editingMa ? `${API}/${editingMa}` : API, {
                    method : editingMa ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                if (!res.ok) {
                    const error = await res.json().catch(() => ({}));
                    throw new Error(error.error || `API lỗi ${res.status}`);
                }

                const successMessage = editingMa ? 'Cập nhật lớp học thành công.' : 'Thêm lớp học thành công.';
                editingMa = null;
                document.getElementById('class-btn').innerText = "Thêm Lớp";
                document.getElementById('class-btn').style.backgroundColor = "";
                resetForm();
                await loadClasses();
                showNotification(successMessage);
            } catch (error) {
                alert(`Không thể lưu lớp học: ${error.message}`);
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            clearTimeout(showNotification.timeout);
            showNotification.timeout = setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function confirmAction(message) {
            const overlay = document.getElementById('confirm-overlay');
            const messageEl = document.getElementById('confirm-message');
            const okBtn = document.getElementById('confirm-ok');
            const cancelBtn = document.getElementById('confirm-cancel');

            messageEl.textContent = message;
            overlay.style.display = 'flex';

            return new Promise(resolve => {
                const cleanup = () => {
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                };

                const onOk = () => {
                    cleanup();
                    overlay.style.display = 'none';
                    resolve(true);
                };

                const onCancel = () => {
                    cleanup();
                    overlay.style.display = 'none';
                    resolve(false);
                };

                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
            });
        }

        function editClass(ma) {
            const lop = classData.find(item => item.MaLop === ma);
            if (!lop) return alert('Không tìm thấy lớp cần sửa!');
            editingMa = ma;

            document.getElementById('maLop').value = lop.MaLop;
            document.getElementById('tenLop').value = lop.TenLop;
            document.getElementById('maKhoa').value = lop.Khoa;

            const btn = document.getElementById('class-btn');
            btn.innerText = "Lưu cập nhật";
            btn.style.backgroundColor = "#3b82f6";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteClass(ma) {
            if (!await confirmAction('Bạn có chắc chắn muốn xóa lớp học này?')) return;
            try {
                const res = await fetch(`${API}/${ma}`, { method: 'DELETE' });
                if (!res.ok) {
                    const error = await res.json().catch(() => ({}));
                    throw new Error(error.error || `API lỗi ${res.status}`);
                }
                if (editingMa === ma) {
                    editingMa = null;
                    resetForm();
                }
                await loadClasses();
                showNotification('Xóa lớp học thành công.');
            } catch (error) {
                alert(`Không thể xóa lớp học: ${error.message}`);
            }
        }

        function resetForm() {
            document.getElementById('tenLop').value = '';
            document.getElementById('maKhoa').value = '';
            document.getElementById('maLop').value  = 'Mã: Tự động';
        }

        window.addEventListener('DOMContentLoaded', loadClasses);
    </script>
</body>
</html>
