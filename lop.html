<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>HỆ THỐNG QUẢN LÝ LỚP</h1>
        </header>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maLop" value="Mã: Tự động" readonly title="Mã lớp tự sinh">
                <input type="text" id="tenLop" placeholder="Tên Lớp (VD: CNTT-K22A)">
                <input type="text" id="maKhoa" placeholder="Mã Khoa (VD: CNTT)">
                <button onclick="handleClass()" class="btn-add" id="class-btn">Thêm Lớp</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã Lớp</th>
                        <th>Tên Lớp</th>
                        <th>Mã Khoa</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="class-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';
        let classData = [];
        let editIndex = null;

        function renderClassTable() {
            const tableBody = document.getElementById('class-table-body');
            tableBody.innerHTML = classData.map((lop, index) => `
                <tr>
                    <td><strong>${lop.MaLop}</strong></td>
                    <td>${lop.TenLop}</td>
                    <td>${lop.MaKhoa}</td>
                    <td>
                        <button onclick="editClass('${lop.MaLop}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteClass('${lop.MaLop}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadClasses() {
            try {
                const res = await fetch(`${API_BASE}/lop`);
                const data = await res.json();
                classData = data.map(row => ({
                    MaLop: row.malop,
                    Khoa: row.khoa,
                    TenLop: row.tenlop
                }));
                renderClassTable();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu lớp:', error);
            }
        }

        function handleClass() {
            const khoa = document.getElementById('khoa').value;
            const tenLop = document.getElementById('tenLop').value;

            if (!khoa || !tenLop) return alert("Vui lòng nhập đầy đủ Khóa và Tên lớp!");

            const newLop = {
                Khoa: khoa,
                TenLop: tenLop
            };

            if (editIndex !== null) {
                newLop.MaLop = classData[editIndex].MaLop;
                classData[editIndex] = newLop;
                editIndex = null;
                document.getElementById('class-btn').innerText = "Thêm Lớp";
                document.getElementById('class-btn').style.backgroundColor = "";
            } else {
                const lastNum = classData.length > 0 
                    ? parseInt(classData[classData.length - 1].MaLop.replace('L', '')) 
                    : 0;
                newLop.MaLop = "L" + (lastNum + 1).toString().padStart(2, '0');
                classData.push(newLop);
            }
            resetForm();
            loadData();
        }

        function editClass(index) {
            const lop = classData[index];
            editIndex = index;

            document.getElementById('maLop').value = lop.MaLop;
            document.getElementById('khoa').value = lop.Khoa;
            document.getElementById('tenLop').value = lop.TenLop;
            document.getElementById('maKhoa').value = lop.MaKhoa;

            const btn = document.getElementById('class-btn');
            btn.innerText = "Lưu cập nhật";
            btn.style.backgroundColor = "#3b82f6";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteClass(index) {
            if(confirm("Bạn có chắc chắn muốn xóa lớp học này?")) {
                classData.splice(index, 1);
                renderClassTable();
            }
        }

        function resetForm() {
            document.getElementById('tenLop').value = '';
            document.getElementById('maKhoa').value = '';
            document.getElementById('maLop').value  = 'Mã: Tự động';
        }

        window.addEventListener('DOMContentLoaded', loadClasses);
    </script>
</body>
</html>
