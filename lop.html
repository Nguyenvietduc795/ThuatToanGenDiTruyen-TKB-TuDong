<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>HỆ THỐNG QUẢN LÝ LỚP</h1>
        </header>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maLop" value="Mã: Tự động" readonly title="Mã lớp tự sinh">
                <input type="text" id="tenLop" placeholder="Tên Lớp (VD: CNTT-K22A)">
                <input type="text" id="maKhoa" placeholder="Mã Khoa (VD: CNTT)">
                <button onclick="handleClass()" class="btn-add" id="class-btn">Thêm Lớp</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã Lớp</th>
                        <th>Tên Lớp</th>
                        <th>Mã Khoa</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="class-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api/lop';
        let data = [];
        let editingMa = null;

        async function loadData() {
            try {
                const res = await fetch(API);
                data = await res.json();
                renderTable();
            } catch {
                alert('Không kết nối được server. Hãy chạy: node server.js');
            }
        }

        function renderTable() {
            document.getElementById('class-table-body').innerHTML = data.map(lop => `
                <tr>
                    <td><strong>${lop.MaLop}</strong></td>
                    <td>${lop.TenLop}</td>
                    <td>${lop.MaKhoa}</td>
                    <td>
                        <button onclick="editClass('${lop.MaLop}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteClass('${lop.MaLop}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function handleClass() {
            const tenLop = document.getElementById('tenLop').value;
            const maKhoa = document.getElementById('maKhoa').value;
            if (!tenLop || !maKhoa) return alert('Vui lòng nhập đầy đủ Tên lớp và Mã khoa!');

            const body = { TenLop: tenLop, MaKhoa: maKhoa };

            if (editingMa) {
                await fetch(`${API}/${editingMa}`, {
                    method : 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                editingMa = null;
                document.getElementById('class-btn').innerText = 'Thêm Lớp';
                document.getElementById('class-btn').style.backgroundColor = '';
            } else {
                await fetch(API, {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
            }
            resetForm();
            loadData();
        }

        function editClass(ma) {
            const lop = data.find(l => l.MaLop === ma);
            editingMa = ma;
            document.getElementById('maLop').value  = lop.MaLop;
            document.getElementById('tenLop').value = lop.TenLop;
            document.getElementById('maKhoa').value = lop.MaKhoa;

            const btn = document.getElementById('class-btn');
            btn.innerText = 'Lưu cập nhật';
            btn.style.backgroundColor = '#3b82f6';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteClass(ma) {
            if (!confirm('Bạn có chắc chắn muốn xóa lớp học này?')) return;
            await fetch(`${API}/${ma}`, { method: 'DELETE' });
            loadData();
        }

        function resetForm() {
            document.getElementById('tenLop').value = '';
            document.getElementById('maKhoa').value = '';
            document.getElementById('maLop').value  = 'Mã: Tự động';
        }

        loadData();
    </script>
</body>
</html>
