<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Giảng Viên - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>HỆ THỐNG GIẢNG VIÊN</h1>
        </header>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maGV" value="Mã: Tự động" readonly title="Mã số tự động cấp">
                <input type="text" id="tenGV" placeholder="Họ và Tên">
                <input type="email" id="email" placeholder="Email">
                <input type="text" id="sdt" placeholder="Số điện thoại">
                <select id="hocVi">
                    <option value="Thạc sĩ">Thạc sĩ</option>
                    <option value="Tiến sĩ">Tiến sĩ</option>
                    <option value="Giáo sư - Tiến sĩ">Giáo sư - Tiến sĩ</option>
                    <option value="Cử nhân">Cử nhân</option>
                </select>
                <input type="text" id="chuyenMon" placeholder="Chuyên môn">
                <select id="trangThai">
                    <option value="Đang giảng dạy">Đang giảng dạy</option>
                    <option value="Tạm ngưng">Tạm ngưng</option>
                </select>
                <button onclick="handleTeacher()" class="btn-add" id="main-btn">Thêm mới</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã GV</th>
                        <th>Họ và Tên</th>
                        <th>Email</th>
                        <th>SĐT</th>
                        <th>Học Vị</th>
                        <th>Chuyên Môn</th>
                        <th>Trạng Thái</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="teacher-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let teacherData = [];
        let editingIndex = null; // Biến tạm để biết đang sửa dòng nào

        function renderTable() {
            const tableBody = document.getElementById('teacher-table-body');
            if (teacherData.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center; padding: 24px; color: #555;">
                            Không có dữ liệu giảng viên. Hãy kiểm tra lại server hoặc database.
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = teacherData.map((gv, index) => `
                <tr>
                    <td><strong>${gv.MaGV}</strong></td>
                    <td>${gv.TenGV}</td>
                    <td>${gv.Email}</td>
                    <td>${gv.SDT}</td>
                    <td>${gv.HocVi}</td>
                    <td>${gv.ChuyenMon}</td>
                    <td><span class="status-tag ${gv.TrangThai === 'Đang giảng dạy' ? 'status-teaching' : 'status-paused'}">${gv.TrangThai}</span></td>
                    <td>
                        <button onclick="editTeacher('${gv.MaGV}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteTeacher('${gv.MaGV}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadTeachers() {
            try {
                const res = await fetch(`${API_BASE}/giangvien`);
                if (!res.ok) {
                    throw new Error(`API lỗi ${res.status}`);
                }
                const data = await res.json();
                console.log('giangvien data:', data);
                teacherData = data.map(row => ({
                    MaGV: row.magv,
                    TenGV: row.tengv,
                    Email: row.email,
                    SDT: row.sdt,
                    HocVi: row.hocvi,
                    ChuyenMon: row.chuyenmon,
                    TrangThai: row.trangthai
                }));
                renderTable();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu giảng viên:', error);
                const tableBody = document.getElementById('teacher-table-body');
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center; padding: 24px; color: #d00;">
                            Lỗi tải dữ liệu giảng viên: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        function handleTeacher() {
            const ten = document.getElementById('tenGV').value;
            const email = document.getElementById('email').value;
            if (!ten || !email) return alert('Vui lòng nhập ít nhất Họ tên và Email!');

            const body = {
                TenGV    : ten,
                Email    : email,
                SDT      : document.getElementById('sdt').value,
                HocVi    : document.getElementById('hocVi').value,
                ChuyenMon: document.getElementById('chuyenMon').value,
                TrangThai: document.getElementById('trangThai').value,
            };

            if (editingIndex !== null) {
                gvInfo.MaGV = teacherData[editingIndex].MaGV;
                teacherData[editingIndex] = gvInfo;
                editingIndex = null;
                document.getElementById('main-btn').innerText = "Thêm mới";
                document.getElementById('main-btn').style.backgroundColor = "";
            } else {
                const lastNum = teacherData.length > 0 ? parseInt(teacherData[teacherData.length - 1].MaGV.replace('GV', '')) : 0;
                gvInfo.MaGV = "GV" + (lastNum + 1).toString().padStart(3, '0');
                teacherData.push(gvInfo);
            }
            resetForm();
            loadData();
        }

        function editTeacher(index) {
            const gv = teacherData[index];
            editingIndex = index;

            document.getElementById('maGV').value = gv.MaGV;
            document.getElementById('tenGV').value = gv.TenGV;
            document.getElementById('email').value = gv.Email;
            document.getElementById('sdt').value = gv.SDT;
            document.getElementById('hocVi').value = gv.HocVi;
            document.getElementById('chuyenMon').value = gv.ChuyenMon;
            document.getElementById('trangThai').value = gv.TrangThai;

            const btn = document.getElementById('main-btn');
            btn.innerText = "Lưu cập nhật";
            btn.style.backgroundColor = "#3b82f6";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteTeacher(ma) {
            if (!confirm('Bạn có chắc chắn muốn xóa giảng viên này?')) return;
            await fetch(`${API}/${ma}`, { method: 'DELETE' });
            loadData();
        }

        function deleteTeacher(index) {
            if(confirm("Bạn có chắc chắn muốn xóa giảng viên này?")) {
                teacherData.splice(index, 1);
                renderTable();
            }
        }

        window.addEventListener('DOMContentLoaded', loadTeachers);
    </script>
</body>
</html>
