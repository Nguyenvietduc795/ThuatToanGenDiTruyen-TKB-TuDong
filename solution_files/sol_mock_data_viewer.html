<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thời Khóa Biểu — Khoa CNTT</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; }
  .timetable { border-collapse: collapse; width: 100%; table-layout: fixed; }
  .timetable th { border:1px solid #d1d5db; background:#f3f4f6; padding:6px 4px;
                  text-align:center; font-size:12px; font-weight:600; line-height:1.4; }
  .timetable td { border:1px solid #e5e7eb; }
  .tiet-lbl  { width:38px; text-align:center; font-size:11px; color:#6b7280;
               background:#f9fafb; padding:2px; }
  .empty-td  { background:#fafafa; height:28px; }
  .free-td   { background:#f0fdf4 !important; text-align:center; vertical-align:middle;
               color:#16a34a; font-size:11px; font-weight:600; height:28px; }
  .done-td   { background:#f3f4f6 !important; text-align:center; vertical-align:middle;
               font-size:10px; color:#9ca3af; height:28px; }
  .sess-cell { vertical-align:top; padding:3px; }
  .sess-card { border-radius:7px; padding:5px 7px; height:100%; }
  .sess-name { font-weight:700; font-size:12px; line-height:1.3; margin-bottom:3px; }
  .sess-info { color:#374151; font-size:10.5px; overflow:hidden;
               text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
  .badge     { display:inline-block; padding:1px 5px; border-radius:4px;
               font-size:9px; font-weight:700; margin-bottom:3px; }
  .bdg-lt { background:#dbeafe; color:#1d4ed8; }
  .bdg-th { background:#dcfce7; color:#15803d; }
  .sang-hd td  { background:#fffbeb; text-align:center; font-size:11px;
                 font-weight:700; color:#92400e; padding:5px; }
  .chieu-hd td { background:#eff6ff; text-align:center; font-size:11px;
                 font-weight:700; color:#1e40af; padding:5px; }
  .c-M01{background:#eff6ff;border-left:3px solid #3b82f6}
  .c-M02{background:#f0fdf4;border-left:3px solid #22c55e}
  .c-M03{background:#faf5ff;border-left:3px solid #a855f7}
  .c-M04{background:#fff7ed;border-left:3px solid #f97316}
  .c-M05{background:#fef2f2;border-left:3px solid #ef4444}
  .c-M06{background:#fefce8;border-left:3px solid #eab308}
  .c-M07{background:#f0fdfa;border-left:3px solid #14b8a6}
  .c-M08{background:#fdf4ff;border-left:3px solid #d946ef}
  .c-def{background:#f9fafb;border-left:3px solid #9ca3af}
  .tab-on { background:#1d4ed8 !important; color:#fff !important; }
  .day-btn-on { background:#0f766e !important; color:#fff !important; }
  .th-date { display:block; font-size:10px; font-weight:400; color:#6b7280; margin-top:1px; }
  .th-sun  { background:#fff1f2 !important; color:#dc2626 !important; }
  .th-sun .th-date { color:#f87171 !important; }
  .wk-badge { display:inline-block; font-size:9px; font-weight:600;
              padding:1px 4px; border-radius:3px; margin-top:2px;
              background:#e0f2fe; color:#0369a1; }
  .wk-done  { background:#fee2e2; color:#b91c1c; }
</style>

/* ── Constants ────────────────────────────────────────────────────── */
// thu_idx: 0=T2, 1=T3, 2=T4, 3=T5, 4=T6, 5=T7, 6=CN
const DAYS      = ['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'];
const DAY_SHORT = ['T2','T3','T4','T5','T6','T7','CN'];
const NDAYS     = 7;
const CLR = {M01:'c-M01',M02:'c-M02',M03:'c-M03',M04:'c-M04',
             M05:'c-M05',M06:'c-M06',M07:'c-M07',M08:'c-M08'};

/* ── State ────────────────────────────────────────────────────────── */
let currentWeek = 1;
let maxWeek     = 1;
let currentDay  = 0;
let activeTab   = 'ql';

/* ── Date helpers ─────────────────────────────────────────────────── */
const SEMESTER_START = (function(){
  // Parse as local date to avoid timezone shift
  const [y,m,d] = DATA.ngay_bat_dau.split('-').map(Number);
  return new Date(y, m-1, d);
})();

function getWeekMonday(week) {
  const d = new Date(SEMESTER_START);
  d.setDate(d.getDate() + (week - 1) * 7);
  return d;
}
function getDayDate(week, dayIdx) {
  const d = new Date(SEMESTER_START);
  d.setDate(d.getDate() + (week - 1) * 7 + dayIdx);
  return d;
}
function fmtDMY(date) {
  return `${pad(date.getDate())}/${pad(date.getMonth()+1)}/${date.getFullYear()}`;
}
function fmtDM(date) {
  return `${pad(date.getDate())}/${pad(date.getMonth()+1)}`;
}
function pad(n){ return String(n).padStart(2,'0'); }

/* ── Helpers ──────────────────────────────────────────────────────── */
function clr(m){ return CLR[m] || 'c-def'; }

/* ── Week navigator ───────────────────────────────────────────────── */
function updateWeekNav() {
  const mon = getWeekMonday(currentWeek);
  const sun = getDayDate(currentWeek, 6);
  document.getElementById('wk-label').textContent =
    `📅 Tuần ${currentWeek} / ${maxWeek}`;
  document.getElementById('wk-range').textContent =
    `${fmtDMY(mon)}  –  ${fmtDMY(sun)}`;
  document.getElementById('max-wk').textContent = maxWeek;
  document.getElementById('btn-prev').disabled = currentWeek <= 1;
  document.getElementById('btn-next').disabled = currentWeek >= maxWeek;
}

function changeWeek(delta) {
  const nw = currentWeek + delta;
  if (nw < 1 || nw > maxWeek) return;
  currentWeek = nw;
  updateWeekNav();
  rerenderAll();
}

function rerenderAll() {
  document.getElementById('grid-ql').innerHTML = buildGridAll(DATA.lich);
  renderGV();
  renderSV();
  // room tab: re-render with fresh day buttons (dates change per week)
  document.getElementById('day-btns').innerHTML = buildDayBtns();
  selectDay(currentDay, false);
}

/* ── Session card HTML ────────────────────────────────────────────── */
function card(s, showGV, showLop, compact) {
  const badge   = `<span class="badge ${s.loai==='TH'?'bdg-th':'bdg-lt'}">${s.loai}</span>`;
  const tRange  = compact
    ? `<div class="sess-info" style="font-size:9px;color:#9ca3af">Tiết ${s.tiet_start}–${s.tiet_end}</div>` : '';
  const gvLine  = showGV  ? `<div class="sess-info">👤 ${s.tengv}</div>` : '';
  const lopLine = showLop ? `<div class="sess-info">🎓 ${s.tenlop}</div>` : '';
  const isActive = currentWeek <= s.so_tuan;
  const wkCls   = isActive ? 'wk-badge' : 'wk-badge wk-done';
  const wkTip   = isActive
    ? `Tuần ${currentWeek}/${s.so_tuan}`
    : `Kết thúc (${s.so_tuan} tuần)`;
  const mb = compact ? 'margin-bottom:3px;' : '';
  return `<div class="sess-card ${clr(s.mamon)}" style="${mb}">
    <div class="sess-name">${s.tenmon}</div>
    ${badge}<span class="${wkCls}">${wkTip}</span>
    ${tRange}${gvLine}${lopLine}
    <div class="sess-info">🏛 ${s.maphong}</div>
  </div>`;
}

/* ── Day column header HTML ───────────────────────────────────────── */
function dayTH(idx) {
  const date = getDayDate(currentWeek, idx);
  const isSun = idx === 6;
  return `<th class="${isSun?'th-sun':''}">${DAYS[idx]}<span class="th-date">${fmtDM(date)}</span></th>`;
}

/* ── Grid with rowspan (GV / SV) ──────────────────────────────────── */
function buildGrid(sessions, showGV, showLop) {
  const g = {};
  sessions.forEach(s => {
    if (!g[s.thu_idx]) g[s.thu_idx] = {};
    g[s.thu_idx][s.tiet_start] = s;
  });
  const rowEnd = new Array(NDAYS).fill(0);
  let h = `<table class="timetable"><thead><tr><th style="width:38px">Tiết</th>`;
  for (let i = 0; i < NDAYS; i++) h += dayTH(i);
  h += '</tr></thead><tbody>';
  for (let t = 1; t <= 12; t++) {
    if (t===1) h += `<tr class="sang-hd"><td colspan="${NDAYS+1}">☀️ BUỔI SÁNG &nbsp;(Tiết 1 – 6)</td></tr>`;
    if (t===7) h += `<tr class="chieu-hd"><td colspan="${NDAYS+1}">🌙 BUỔI CHIỀU &nbsp;(Tiết 7 – 12)</td></tr>`;
    h += '<tr>';
    h += `<td class="tiet-lbl">${t}</td>`;
    for (let d = 0; d < NDAYS; d++) {
      if (rowEnd[d] > t) continue;
      const s = g[d] && g[d][t];
      const active = s && currentWeek <= s.so_tuan;
      if (active) {
        const sp = s.tiet_end - s.tiet_start + 1;
        rowEnd[d] = t + sp;
        h += `<td rowspan="${sp}" class="sess-cell">${card(s, showGV, showLop, false)}</td>`;
      } else if (s && currentWeek > s.so_tuan) {
        // Session exists but has ended — consume span, show muted
        const sp = s.tiet_end - s.tiet_start + 1;
        rowEnd[d] = t + sp;
        h += `<td rowspan="${sp}" class="done-td">✓ Đã kết thúc</td>`;
      } else {
        h += '<td class="empty-td"></td>';
      }
    }
    h += '</tr>';
  }
  return h + '</tbody></table>';
}

/* ── Management grid (multiple sessions per start-tiết) ──────────── */
function buildGridAll(sessions) {
  const g = {};
  sessions.forEach(s => {
    if (!g[s.thu_idx]) g[s.thu_idx] = {};
    if (!g[s.thu_idx][s.tiet_start]) g[s.thu_idx][s.tiet_start] = [];
    g[s.thu_idx][s.tiet_start].push(s);
  });
  const tiets = [...new Set(sessions.map(s => s.tiet_start))].sort((a,b) => a-b);
  let h = `<table class="timetable"><thead><tr><th style="width:55px">Tiết BĐ</th>`;
  for (let i = 0; i < NDAYS; i++) h += dayTH(i);
  h += '</tr></thead><tbody>';
  let prev = null;
  tiets.forEach(t => {
    const buoi = t <= 6 ? 'sang' : 'chieu';
    if (buoi !== prev) {
      prev = buoi;
      h += buoi==='sang'
        ? `<tr class="sang-hd"><td colspan="${NDAYS+1}">☀️ BUỔI SÁNG</td></tr>`
        : `<tr class="chieu-hd"><td colspan="${NDAYS+1}">🌙 BUỔI CHIỀU</td></tr>`;
    }
    h += '<tr>';
    h += `<td class="tiet-lbl" style="font-size:10px">Tiết<br><b>${t}</b></td>`;
    for (let d = 0; d < NDAYS; d++) {
      const list = (g[d] && g[d][t]) || [];
      if (!list.length) { h += '<td class="empty-td"></td>'; continue; }
      const active = list.filter(s => currentWeek <= s.so_tuan);
      const done   = list.filter(s => currentWeek > s.so_tuan);
      if (!active.length) {
        h += `<td class="done-td">✓ Kết thúc</td>`;
        continue;
      }
      h += '<td class="sess-cell" style="min-width:130px">';
      active.forEach(s => h += card(s, true, true, true));
      done.forEach(s => h += `<div style="opacity:0.35">${card(s,true,true,true)}</div>`);
      h += '</td>';
    }
    h += '</tr>';
  });
  return h + '</tbody></table>';
}

/* ── Room availability grid for a specific day ────────────────────── */
function buildRoomGrid(dayIdx) {
  const rooms   = DATA.phong_list;
  const nCols   = rooms.length;
  const dayDate = getDayDate(currentWeek, dayIdx);

  const rg = {};
  rooms.forEach(r => { rg[r.maphong] = {}; });
  DATA.lich
    .filter(s => s.thu_idx === dayIdx && currentWeek <= s.so_tuan)
    .forEach(s => { rg[s.maphong][s.tiet_start] = s; });

  const freeCount = {};
  rooms.forEach(r => {
    let occ = new Set();
    DATA.lich
      .filter(s => s.thu_idx===dayIdx && s.maphong===r.maphong && currentWeek<=s.so_tuan)
      .forEach(s => { for(let t=s.tiet_start;t<=s.tiet_end;t++) occ.add(t); });
    freeCount[r.maphong] = 10 - occ.size;
  });

  const rowEnd = {};
  rooms.forEach(r => { rowEnd[r.maphong] = 0; });

  let h = `<table class="timetable"><thead><tr>`;
  h += `<th style="width:40px">Tiết</th>`;
  rooms.forEach(r => {
    const lt = r.loaiphong==='LT'
      ? '<span style="font-size:9px;background:#dbeafe;color:#1d4ed8;padding:1px 4px;border-radius:3px;font-weight:700">LT</span>'
      : '<span style="font-size:9px;background:#dcfce7;color:#15803d;padding:1px 4px;border-radius:3px;font-weight:700">TH</span>';
    const fl = freeCount[r.maphong] > 0
      ? `<span style="font-size:9px;color:#16a34a">(còn ${freeCount[r.maphong]} tiết)</span>`
      : `<span style="font-size:9px;color:#dc2626">(hết tiết)</span>`;
    h += `<th>${r.maphong} ${lt}<br><span style="font-size:10px;font-weight:400;color:#6b7280">${r.tenphong}</span><br>${fl}</th>`;
  });
  h += '</tr></thead><tbody>';

  for (let t = 1; t <= 12; t++) {
    if (t===1) h += `<tr class="sang-hd"><td colspan="${nCols+1}">☀️ BUỔI SÁNG &nbsp;(Tiết 1 – 6)</td></tr>`;
    if (t===7) h += `<tr class="chieu-hd"><td colspan="${nCols+1}">🌙 BUỔI CHIỀU &nbsp;(Tiết 7 – 12)</td></tr>`;
    h += '<tr>';
    h += `<td class="tiet-lbl">${t}</td>`;
    rooms.forEach(r => {
      if (rowEnd[r.maphong] > t) return;
      const s = rg[r.maphong][t];
      if (s) {
        const sp = s.tiet_end - s.tiet_start + 1;
        rowEnd[r.maphong] = t + sp;
        h += `<td rowspan="${sp}" class="sess-cell">
          <div class="sess-card ${clr(s.mamon)}">
            <div class="sess-name">${s.tenmon}</div>
            <span class="badge ${s.loai==='TH'?'bdg-th':'bdg-lt'}">${s.loai}</span>
            <span class="wk-badge">Tuần ${currentWeek}/${s.so_tuan}</span>
            <div class="sess-info">🎓 ${s.tenlop}</div>
            <div class="sess-info">👤 ${s.tengv}</div>
          </div>
        </td>`;
      } else {
        h += '<td class="free-td">🟢<br>TRỐNG</td>';
      }
    });
    h += '</tr>';
  }
  return h + '</tbody></table>';
}

/* ── Room stats ───────────────────────────────────────────────────── */
function buildRoomStats(dayIdx) {
  const rooms = DATA.phong_list;
  const totalTiets = 10;
  let totalFree = 0, totalOcc = 0;
  rooms.forEach(r => {
    let occ = new Set();
    DATA.lich.filter(s => s.thu_idx===dayIdx && s.maphong===r.maphong && currentWeek<=s.so_tuan)
             .forEach(s => { for(let t=s.tiet_start;t<=s.tiet_end;t++) occ.add(t); });
    totalOcc  += occ.size;
    totalFree += (totalTiets - occ.size);
  });
  const totalSlots = rooms.length * totalTiets;
  const pctFree = Math.round(totalFree / totalSlots * 100);
  const pctOcc  = 100 - pctFree;
  return [
    {icon:'🏛', val:rooms.length,           lbl:'Tổng số phòng',          bg:'bg-blue-50',  bd:'border-blue-200',  tx:'text-blue-700'},
    {icon:'🟢', val:`${totalFree} tiết`,     lbl:`Còn trống (${pctFree}%)`, bg:'bg-green-50', bd:'border-green-200', tx:'text-green-700'},
    {icon:'🔴', val:`${totalOcc} tiết`,      lbl:`Đã dùng (${pctOcc}%)`,   bg:'bg-red-50',   bd:'border-red-200',   tx:'text-red-700'},
  ].map(i => `
    <div class="rounded-2xl shadow border p-4 ${i.bg} ${i.bd}">
      <div class="text-3xl">${i.icon}</div>
      <div class="text-2xl font-bold ${i.tx} mt-1">${i.val}</div>
      <div class="text-sm ${i.tx} font-medium mt-1">${i.lbl}</div>
    </div>`).join('');
}

/* ── Stats cards ──────────────────────────────────────────────────── */
function buildStats() {
  const L = DATA.lich;
  return [
    {icon:'📅', val:L.length,                          lbl:'Tổng buổi học',  bg:'bg-blue-50',  bd:'border-blue-200',  tx:'text-blue-700'},
    {icon:'👨‍🏫',val:new Set(L.map(s=>s.magv)).size,    lbl:'Giảng viên',     bg:'bg-green-50', bd:'border-green-200', tx:'text-green-700'},
    {icon:'🎓', val:new Set(L.map(s=>s.malop)).size,   lbl:'Lớp học',        bg:'bg-purple-50',bd:'border-purple-200',tx:'text-purple-700'},
    {icon:'🏛', val:new Set(L.map(s=>s.maphong)).size, lbl:'Phòng sử dụng',  bg:'bg-orange-50',bd:'border-orange-200',tx:'text-orange-700'},
  ].map(i => `
    <div class="rounded-2xl shadow border p-4 ${i.bg} ${i.bd}">
      <div class="text-3xl">${i.icon}</div>
      <div class="text-3xl font-bold ${i.tx} mt-1">${i.val}</div>
      <div class="text-sm ${i.tx} font-medium mt-1">${i.lbl}</div>
    </div>`).join('');
}

/* ── Subject legend ───────────────────────────────────────────────── */
function buildLegend() {
  const ms = {};
  DATA.lich.forEach(s => { ms[s.mamon] = s.tenmon; });
  return '<span class="text-gray-400 mr-1 self-center text-xs">Màu:</span>'
    + Object.entries(ms).map(([m,n]) =>
        `<span class="inline-flex items-center gap-1 px-2 py-1 rounded-lg border text-xs font-medium ${clr(m)}">${m}: ${n}</span>`
      ).join('');
}

/* ── Day selector buttons (room tab) ─────────────────────────────── */
function buildDayBtns() {
  return DAYS.map((d, i) => {
    const date  = getDayDate(currentWeek, i);
    const isSun = i === 6;
    const clsCn = isSun ? 'style="border:1px solid #fca5a5"' : '';
    return `<button id="daybtn-${i}" onclick="selectDay(${i}, true)"
      class="px-4 py-2 rounded-xl font-semibold text-sm shadow bg-white text-gray-600 transition-all" ${clsCn}>
      <span${isSun?' style="color:#dc2626"':''}>${DAY_SHORT[i]}</span><br>
      <span style="font-size:10px;font-weight:400;color:${isSun?'#f87171':'#6b7280'}">${fmtDM(date)}</span>
    </button>`;
  }).join('');
}

function selectDay(dayIdx, rerender) {
  currentDay = dayIdx;
  document.querySelectorAll('[id^="daybtn-"]').forEach(b => {
    b.classList.remove('day-btn-on');
    b.classList.add('bg-white','text-gray-600');
  });
  const btn = document.getElementById('daybtn-' + dayIdx);
  if (btn) { btn.classList.add('day-btn-on'); btn.classList.remove('bg-white','text-gray-600'); }
  if (rerender) renderRoomGrid(dayIdx);
}

function renderRoomGrid(dayIdx) {
  document.getElementById('room-stats').innerHTML = buildRoomStats(dayIdx);
  document.getElementById('grid-ph').innerHTML    = buildRoomGrid(dayIdx);
}

/* ── Tab switching ────────────────────────────────────────────────── */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-pane').forEach(e => e.classList.add('hidden'));
  document.querySelectorAll('[id^="btn-"]').forEach(e => {
    e.classList.remove('tab-on');
    e.classList.add('bg-white','text-gray-600');
  });
  document.getElementById('tab-'+tab).classList.remove('hidden');
  const b = document.getElementById('btn-'+tab);
  b.classList.add('tab-on');
  b.classList.remove('bg-white','text-gray-600');
  if (tab === 'ph') { selectDay(currentDay, true); }
}

/* ── GV render ────────────────────────────────────────────────────── */
function renderGV() {
  const id = document.getElementById('sel-gv').value;
  const gv = DATA.gv_list.find(g => g.magv===id) || {};
  document.getElementById('gv-info').textContent = gv.hocvi || '';
  const ses = DATA.lich.filter(s => s.magv===id);
  document.getElementById('grid-gv').innerHTML = ses.length
    ? buildGrid(ses, false, true)
    : '<p class="text-gray-400 text-sm py-10 text-center">Không có lịch dạy trong học kỳ này.</p>';
}

/* ── SV render ────────────────────────────────────────────────────── */
function renderSV() {
  const id  = document.getElementById('sel-lop').value;
  const ses = DATA.lich.filter(s => s.malop===id);
  // Summary: per subject, show so_tuan
  const monMap = {};
  ses.forEach(s => {
    const key = s.mamon + s.loai;
    if (!monMap[key]) monMap[key] = s;
  });
  const summaryHTML = Object.values(monMap).map(s => {
    const done = currentWeek > s.so_tuan;
    const cls  = done ? 'bg-gray-100 text-gray-400 line-through' : `${clr(s.mamon)} border`;
    return `<span class="px-2 py-0.5 rounded-lg ${cls}">
      ${s.tenmon} (${s.loai}) — ${done ? `✓ ${s.so_tuan} tuần` : `${currentWeek}/${s.so_tuan} tuần`}
    </span>`;
  }).join('');
  document.getElementById('sv-summary').innerHTML = summaryHTML;
  document.getElementById('grid-sv').innerHTML = ses.length
    ? buildGrid(ses, true, false)
    : '<p class="text-gray-400 text-sm py-10 text-center">Không có lịch học trong học kỳ này.</p>';
}

/* ── Init ─────────────────────────────────────────────────────────── */
function init() {
  maxWeek = Math.max(...DATA.lich.map(s => s.so_tuan));

  updateWeekNav();

  document.getElementById('stats-row').innerHTML  = buildStats();
  document.getElementById('legend-row').innerHTML = buildLegend();
  document.getElementById('grid-ql').innerHTML    = buildGridAll(DATA.lich);

  // GV dropdown
  const sgv = document.getElementById('sel-gv');
  DATA.gv_list.forEach(g => {
    const o = document.createElement('option');
    o.value = g.magv; o.textContent = `${g.tengv} (${g.hocvi})`; sgv.appendChild(o);
  });

  // Lớp dropdown
  const slop = document.getElementById('sel-lop');
  DATA.lop_list.forEach(l => {
    const o = document.createElement('option');
    o.value = l.malop; o.textContent = l.tenlop; slop.appendChild(o);
  });

  renderGV(); renderSV();

  // Room tab
  document.getElementById('day-btns').innerHTML = buildDayBtns();
  selectDay(0, true);

  switchTab('ql');
}

window.onload = init;
</script>
