<!DOCTYPE html>
<html lang="vi">
<head>

<title>Thời Khóa Biểu — Khoa CNTT</title>

<style>
  body { font-family: 'Segoe UI', sans-serif; }
  .timetable { border-collapse: collapse; width: 100%; table-layout: fixed; }
  .timetable th { border:1px solid #d1d5db; background:#f3f4f6; padding:8px 4px;
                  text-align:center; font-size:13px; font-weight:600; }
  .timetable td { border:1px solid #e5e7eb; }
  .tiet-lbl  { width:40px; text-align:center; font-size:11px; color:#6b7280;
               background:#f9fafb; padding:2px; }
  .empty-td  { background:#fafafa; height:30px; }
  .free-td   { background:#f0fdf4 !important; text-align:center; vertical-align:middle;
               color:#16a34a; font-size:11px; font-weight:600; height:30px; }
  .sess-cell { vertical-align:top; padding:3px; }
  .sess-card { border-radius:7px; padding:5px 7px; height:100%; }
  .sess-name { font-weight:700; font-size:12px; line-height:1.3; margin-bottom:3px; }
  .sess-info { color:#374151; font-size:10.5px; overflow:hidden;
               text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
  .badge     { display:inline-block; padding:1px 5px; border-radius:4px;
               font-size:9px; font-weight:700; margin-bottom:3px; }
  .bdg-lt { background:#dbeafe; color:#1d4ed8; }
  .bdg-th { background:#dcfce7; color:#15803d; }
  .sang-hd td  { background:#fffbeb; text-align:center; font-size:11px;
                 font-weight:700; color:#92400e; padding:5px; }
  .chieu-hd td { background:#eff6ff; text-align:center; font-size:11px;
                 font-weight:700; color:#1e40af; padding:5px; }
  .c-M01{background:#eff6ff;border-left:3px solid #3b82f6}
  .c-M02{background:#f0fdf4;border-left:3px solid #22c55e}
  .c-M03{background:#faf5ff;border-left:3px solid #a855f7}
  .c-M04{background:#fff7ed;border-left:3px solid #f97316}
  .c-M05{background:#fef2f2;border-left:3px solid #ef4444}
  .c-M06{background:#fefce8;border-left:3px solid #eab308}
  .c-M07{background:#f0fdfa;border-left:3px solid #14b8a6}
  .c-M08{background:#fdf4ff;border-left:3px solid #d946ef}
  .c-def{background:#f9fafb;border-left:3px solid #9ca3af}
  .tab-on { background:#1d4ed8 !important; color:#fff !important; }
  .day-btn-on { background:#0f766e !important; color:#fff !important; }
  .week-nav-btn { transition: all .15s; }
  .week-nav-btn:hover { background:#e0e7ff; }
  .week-nav-btn:disabled { opacity:.35; cursor:default; }
</style>

/* ── Phân trang tuần ─────────────────────────────────────────────────────── */
// start_date do Python nhúng vào DATA (thứ Hai của tuần chạy thuật toán).
// Fallback: thứ Hai của tuần hiện tại nếu thiếu.
const START_DATE = (() => {
  if (DATA.start_date) return new Date(DATA.start_date + 'T00:00:00');
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay() + (d.getDay()===0 ? -6 : 1));
  return d;
})();

let currentWeek = 1;

function getWeekDates(week) {
  return Array.from({length: 6}, (_, i) => {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + (week - 1) * 7 + i);
    return d;
  });
}

function fmt(d) {
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
}

function updateWeekNav() {
  const dates = getWeekDates(currentWeek);
  document.getElementById('week-label').textContent = `Tuần ${currentWeek}`;
  document.getElementById('week-range').textContent  = `${fmt(dates[0])} – ${fmt(dates[5])}`;
  document.getElementById('btn-prev').disabled = currentWeek <= 1;
}

function prevWeek() {
  if (currentWeek <= 1) return;
  currentWeek--;
  updateWeekNav();
  refreshActiveTab();
}

function nextWeek() {
  currentWeek++;
  updateWeekNav();
  refreshActiveTab();
}

function refreshActiveTab() {
  const pane = document.querySelector('.tab-pane:not(.hidden)');
  if (!pane) return;
  const tab = pane.id.replace('tab-', '');
  if      (tab === 'ql') document.getElementById('grid-ql').innerHTML = buildGridAll(DATA.lich);
  else if (tab === 'gv') renderGV();
  else if (tab === 'sv') renderSV();
  else if (tab === 'ph') { rebuildDayBtns(); renderRoomGrid(currentDay); }
}

/* ── Tab switching ── */

    e.classList.add('bg-white','text-gray-600');
  });

  const b = document.getElementById('btn-'+tab);
  b.classList.add('tab-on');
  b.classList.remove('bg-white','text-gray-600');
  if(tab==='ph'){ rebuildDayBtns(); renderRoomGrid(currentDay); }
}

/* ── Session card HTML ── */
function card(s, showGV, showLop, compact){
  const badge   = `<span class="badge ${s.loai==='TH'?'bdg-th':'bdg-lt'}">${s.loai}</span>`;
  const tRange  = compact
    ? `<div class="sess-info" style="font-size:9px;color:#9ca3af">Tiết ${s.tiet_start}–${s.tiet_end}</div>` : '';
  const gvLine  = showGV  ? `<div class="sess-info">👤 ${s.tengv}</div>`  : '';
  const lopLine = showLop ? `<div class="sess-info">🎓 ${s.tenlop}</div>` : '';
  const mb = compact ? 'margin-bottom:3px;' : '';
  return `<div class="sess-card ${clr(s.mamon)}" style="${mb}">
    <div class="sess-name">${s.tenmon}</div>
    ${badge}${tRange}${gvLine}${lopLine}
    <div class="sess-info">🏛 ${s.maphong}</div>
  </div>`;
}

/* ── Tổng tiết theo môn → tính last_week ── */
const MON_TIET = {};
(DATA.mon_list || []).forEach(m => {
  MON_TIET[m.mamon] = { LT: m.sotietlythuyet || 0, TH: m.sotietthuchanh || 0 };
});

function getLastWeek(s) {
  if (s.last_week != null) return s.last_week;
  // Fallback: đếm số buổi/tuần cùng môn+loại+lớp → tính tiết/tuần
  const dur = s.tiet_end - s.tiet_start + 1;
  const cnt = DATA.lich.filter(x => x.mamon===s.mamon && x.loai===s.loai && x.malop===s.malop).length;
  const tietsPerWeek = cnt * dur;
  const total = (MON_TIET[s.mamon] || {})[s.loai] || tietsPerWeek;
  return Math.ceil(total / tietsPerWeek);
}

/* ── Lọc session còn trong tuần hiện tại ── */
function activeSessions(sessions){
  return sessions.filter(s => currentWeek <= getLastWeek(s));
}

/* ── Grid GV / SV (1 session per slot per day, with rowspan) ── */
function buildGrid(sessions, showGV, showLop){
  const g = {};
  activeSessions(sessions).forEach(s=>{
    if(!g[s.thu_idx]) g[s.thu_idx]={};
    g[s.thu_idx][s.tiet_start] = s;
  });
  const rowEnd = new Array(6).fill(0);
  let h = `<table class="timetable"><thead><tr><th style="width:40px">Tiết</th>${dayHeaders()}</tr></thead><tbody>`;
  for(let t=1; t<=12; t++){
    if(t===1) h+='<tr class="sang-hd"><td colspan="7">☀️ BUỔI SÁNG &nbsp;(Tiết 1 – 6)</td></tr>';
    if(t===7) h+='<tr class="chieu-hd"><td colspan="7">🌙 BUỔI CHIỀU &nbsp;(Tiết 7 – 12)</td></tr>';
    h+=`<tr><td class="tiet-lbl">${t}</td>`;
    for(let d=0; d<6; d++){
      if(rowEnd[d]>t) continue;
      const s = g[d] && g[d][t];
      if(s){
        const sp = s.tiet_end - s.tiet_start + 1;
        rowEnd[d] = t + sp;
        h+=`<td rowspan="${sp}" class="sess-cell">${card(s,showGV,showLop,false)}</td>`;
      } else {
        h+='<td class="empty-td"></td>';
      }
    }
    h+='</tr>';
  }
  return h+'</tbody></table>';
}

/* ── Management grid (multiple sessions per start-tiết) ── */
function buildGridAll(sessions){
  const g = {};
  activeSessions(sessions).forEach(s=>{
    if(!g[s.thu_idx]) g[s.thu_idx]={};
    if(!g[s.thu_idx][s.tiet_start]) g[s.thu_idx][s.tiet_start]=[];
    g[s.thu_idx][s.tiet_start].push(s);
  });
  const tiets = [...new Set(sessions.map(s=>s.tiet_start))].sort((a,b)=>a-b);
  let h = `<table class="timetable"><thead><tr><th style="width:55px">Tiết BĐ</th>${dayHeaders()}</tr></thead><tbody>`;
  let prev = null;
  tiets.forEach(t=>{
    const buoi = t<=6 ? 'sang' : 'chieu';
    if(buoi!==prev){
      prev=buoi;
      h += buoi==='sang'
        ? '<tr class="sang-hd"><td colspan="7">☀️ BUỔI SÁNG</td></tr>'
        : '<tr class="chieu-hd"><td colspan="7">🌙 BUỔI CHIỀU</td></tr>';
    }
    h+=`<tr><td class="tiet-lbl" style="font-size:10px">Tiết<br><b>${t}</b></td>`;
    for(let d=0; d<6; d++){
      const list = (g[d]&&g[d][t])||[];
      if(!list.length){ h+='<td class="empty-td"></td>'; continue; }
      h+='<td class="sess-cell" style="min-width:140px">';
      list.forEach(s => h+=card(s,true,true,true));
      h+='</td>';
    }
    h+='</tr>';
  });
  return h+'</tbody></table>';
}

/* ── Room grid for a specific day ── */
function buildRoomGrid(dayIdx){
  const rooms  = DATA.phong_list;
  const nCols  = rooms.length;
  const active = activeSessions(DATA.lich);
  const rg     = {};
  rooms.forEach(r => { rg[r.maphong] = {}; });
  active.filter(s => s.thu_idx === dayIdx).forEach(s => {
    rg[s.maphong][s.tiet_start] = s;
  });

  const freeCount = {};
  rooms.forEach(r => {
    const occ = new Set();
    active.filter(s => s.thu_idx===dayIdx && s.maphong===r.maphong)
             .forEach(s=>{ for(let t=s.tiet_start;t<=s.tiet_end;t++) occ.add(t); });
    freeCount[r.maphong] = 10 - occ.size;
  });

  const rowEnd = {};
  rooms.forEach(r => { rowEnd[r.maphong] = 0; });

  let h = `<table class="timetable"><thead><tr><th style="width:40px">Tiết</th>`;
  rooms.forEach(r => {
    const lt = r.loaiphong==='LT'
      ? '<span style="font-size:9px;background:#dbeafe;color:#1d4ed8;padding:1px 4px;border-radius:3px;font-weight:700">LT</span>'
      : '<span style="font-size:9px;background:#dcfce7;color:#15803d;padding:1px 4px;border-radius:3px;font-weight:700">TH</span>';
    const fl = freeCount[r.maphong]>0
      ? `<span style="font-size:9px;color:#16a34a">(còn ${freeCount[r.maphong]} tiết trống)</span>`
      : `<span style="font-size:9px;color:#dc2626">(hết tiết)</span>`;
    h += `<th>${r.maphong} ${lt}<br><span style="font-size:10px;font-weight:400;color:#6b7280">${r.tenphong}</span><br>${fl}</th>`;
  });
  h += '</tr></thead><tbody>';

  for(let t=1; t<=12; t++){
    if(t===1) h+=`<tr class="sang-hd"><td colspan="${nCols+1}">☀️ BUỔI SÁNG &nbsp;(Tiết 1 – 6)</td></tr>`;
    if(t===7) h+=`<tr class="chieu-hd"><td colspan="${nCols+1}">🌙 BUỔI CHIỀU &nbsp;(Tiết 7 – 12)</td></tr>`;
    h+=`<tr><td class="tiet-lbl">${t}</td>`;
    rooms.forEach(r => {
      if(rowEnd[r.maphong] > t) return;
      const s = rg[r.maphong][t];
      if(s){
        const sp = s.tiet_end - s.tiet_start + 1;
        rowEnd[r.maphong] = t + sp;
        h+=`<td rowspan="${sp}" class="sess-cell">
          <div class="sess-card ${clr(s.mamon)}">
            <div class="sess-name">${s.tenmon}</div>
            <span class="badge ${s.loai==='TH'?'bdg-th':'bdg-lt'}">${s.loai}</span>
            <div class="sess-info">🎓 ${s.tenlop}</div>
            <div class="sess-info">👤 ${s.tengv}</div>
          </div>
        </td>`;
      } else {
        h+='<td class="free-td">🟢<br>TRỐNG</td>';
      }
    });
    h+='</tr>';
  }
  return h+'</tbody></table>';
}

/* ── Room stats ── */
function buildRoomStats(dayIdx){
  const rooms  = DATA.phong_list;
  const active = activeSessions(DATA.lich);
  const total  = 10;
  let free = 0, occ = 0;
  rooms.forEach(r => {
    const s = new Set();
    active.filter(x=>x.thu_idx===dayIdx&&x.maphong===r.maphong)
             .forEach(x=>{ for(let t=x.tiet_start;t<=x.tiet_end;t++) s.add(t); });
    occ  += s.size;
    free += total - s.size;
  });
  const tot   = rooms.length * total;
  const pFree = Math.round(free/tot*100);
  return [
    {icon:'🏛', val:rooms.length,       lbl:'Tổng số phòng',         bg:'bg-blue-50',  bd:'border-blue-200',  tx:'text-blue-700'},
    {icon:'🟢', val:`${free} tiết`,     lbl:`Còn trống (${pFree}%)`, bg:'bg-green-50', bd:'border-green-200', tx:'text-green-700'},
    {icon:'🔴', val:`${occ} tiết`,      lbl:`Đã dùng (${100-pFree}%)`,bg:'bg-red-50',  bd:'border-red-200',   tx:'text-red-700'},
  ].map(i=>`
    <div class="rounded-2xl shadow border p-4 ${i.bg} ${i.bd}">
      <div class="text-3xl">${i.icon}</div>
      <div class="text-2xl font-bold ${i.tx} mt-1">${i.val}</div>
      <div class="text-sm ${i.tx} font-medium mt-1">${i.lbl}</div>
    </div>`).join('');
}

/* ── Stats cards ── */
function buildStats(){
  const L = DATA.lich;
  return [
    {icon:'📅', val:L.length,                          lbl:'Tổng buổi học', bg:'bg-blue-50',  bd:'border-blue-200',  tx:'text-blue-700'},
    {icon:'👨‍🏫',val:new Set(L.map(s=>s.magv)).size,    lbl:'Giảng viên',    bg:'bg-green-50', bd:'border-green-200', tx:'text-green-700'},
    {icon:'🎓', val:new Set(L.map(s=>s.malop)).size,   lbl:'Lớp học',       bg:'bg-purple-50',bd:'border-purple-200',tx:'text-purple-700'},
    {icon:'🏛', val:new Set(L.map(s=>s.maphong)).size, lbl:'Phòng sử dụng', bg:'bg-orange-50',bd:'border-orange-200',tx:'text-orange-700'},
  ].map(i=>`
    <div class="rounded-2xl shadow border p-4 ${i.bg} ${i.bd}">
      <div class="text-3xl">${i.icon}</div>
      <div class="text-3xl font-bold ${i.tx} mt-1">${i.val}</div>
      <div class="text-sm ${i.tx} font-medium mt-1">${i.lbl}</div>
    </div>`).join('');
}

/* ── Legend ── */
function buildLegend(){
  const ms = {};
  DATA.lich.forEach(s=>{ ms[s.mamon]=s.tenmon; });
  return '<span class="text-gray-400 mr-1 self-center text-xs">Màu:</span>'
    + Object.entries(ms).map(([m,n])=>
        `<span class="inline-flex items-center gap-1 px-2 py-1 rounded-lg border text-xs font-medium ${clr(m)}">${m}: ${n}</span>`
      ).join('');
}

/* ── Day buttons for room tab (hiển thị ngày thực tế theo tuần) ── */
let currentDay = 0;

function rebuildDayBtns(){
  const dates = getWeekDates(currentWeek);
  document.getElementById('day-btns').innerHTML = DAYS.map((d,i)=>`
    <button id="daybtn-${i}" onclick="selectDay(${i})"
      class="px-4 py-2 rounded-xl font-semibold text-sm shadow bg-white text-gray-600 transition-all">
      ${d} <span style="font-weight:400;font-size:11px">${fmt(dates[i])}</span>
    </button>`).join('');
  // khôi phục trạng thái nút active
  const btn = document.getElementById('daybtn-'+currentDay);
  if(btn){ btn.classList.add('day-btn-on'); btn.classList.remove('bg-white','text-gray-600'); }
}

function selectDay(dayIdx){
  currentDay = dayIdx;
  document.querySelectorAll('[id^="daybtn-"]').forEach(b=>{
    b.classList.remove('day-btn-on'); b.classList.add('bg-white','text-gray-600');
  });
  const btn = document.getElementById('daybtn-'+dayIdx);
  if(btn){ btn.classList.add('day-btn-on'); btn.classList.remove('bg-white','text-gray-600'); }
  renderRoomGrid(dayIdx);
}

function renderRoomGrid(dayIdx){
  document.getElementById('room-stats').innerHTML = buildRoomStats(dayIdx);
  document.getElementById('grid-ph').innerHTML    = buildRoomGrid(dayIdx);
}

/* ── GV / SV render ── */
function renderGV(){
  const id = document.getElementById('sel-gv').value;
  const gv = DATA.gv_list.find(g=>g.magv===id)||{};
  document.getElementById('gv-info').textContent = gv.hocvi||'';
  const ses = DATA.lich.filter(s=>s.magv===id);
  document.getElementById('grid-gv').innerHTML = ses.length
    ? buildGrid(ses, false, true)
    : '<p class="text-gray-400 text-sm py-10 text-center">Không có lịch dạy trong tuần này.</p>';
}

function renderSV(){
  const id  = document.getElementById('sel-lop').value;
  const ses = DATA.lich.filter(s=>s.malop===id);
  document.getElementById('grid-sv').innerHTML = ses.length
    ? buildGrid(ses, true, false)
    : '<p class="text-gray-400 text-sm py-10 text-center">Không có lịch học trong tuần này.</p>';
}

/* ── Init ── */
function init(){
  document.getElementById('stats-row').innerHTML  = buildStats();
  document.getElementById('legend-row').innerHTML = buildLegend();
  document.getElementById('grid-ql').innerHTML    = buildGridAll(DATA.lich);

  const sgv = document.getElementById('sel-gv');
  DATA.gv_list.forEach(g=>{
    const o = document.createElement('option');
    o.value=g.magv; o.textContent=`${g.tengv} (${g.hocvi})`; sgv.appendChild(o);
  });

  const slop = document.getElementById('sel-lop');
  DATA.lop_list.forEach(l=>{
    const o = document.createElement('option');
    o.value=l.malop; o.textContent=l.tenlop; slop.appendChild(o);
  });

  updateWeekNav();
  rebuildDayBtns();
  selectDay(0);
  renderGV(); renderSV();
  switchTab('ql');
}

window.onload = init;
</script>
