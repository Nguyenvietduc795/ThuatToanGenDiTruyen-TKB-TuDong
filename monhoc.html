<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Môn Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">

        <div class="page-header">
            <span class="page-header-icon">📚</span>
            <div>
                <div class="page-title">DANH MỤC MÔN HỌC</div>
                <div class="page-subtitle">Quản lý học phần lý thuyết, thực hành và loại phòng sử dụng</div>
            </div>
        </div>

        <div id="subject-stats" class="stat-row"></div>

        <div id="notification" class="notification"></div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">✏️ Thêm mới / Chỉnh sửa môn học</span>
            </div>
            <div class="form-section">
                <div class="input-group">
                    <input type="text" id="maMon" value="Mã: Tự động" readonly title="Mã môn tự sinh">
                    <input type="text" id="tenMon" placeholder="Tên môn học">
                    <input type="number" id="soTinChi"   placeholder="Số tín chỉ"  min="0">
                    <input type="number" id="tongSoTiet" placeholder="Tổng tiết"   min="0">
                    <input type="number" id="soTietLT"   placeholder="Tiết lý thuyết" min="0">
                    <input type="number" id="soTietTH"   placeholder="Tiết thực hành" min="0">
                    <select id="loaiPhong">
                        <option value="Lý thuyết">Lý thuyết</option>
                        <option value="Phòng máy">Phòng máy</option>
                    </select>
                    <button onclick="handleSubject()" class="btn-add" id="sub-btn">+ Thêm Môn</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">📋 Danh sách môn học</span>
                <div class="table-search-wrap">
                    <input type="text" id="subject-search" class="table-search-input"
                        placeholder="Tìm tên môn, mã môn..." oninput="filterTable(this.value)">
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Mã Môn</th>
                            <th>Tên Môn Học</th>
                            <th style="text-align:center">Số TC</th>
                            <th style="text-align:center">Tổng Tiết</th>
                            <th style="text-align:center">Lý Thuyết</th>
                            <th style="text-align:center">Thực Hành</th>
                            <th>Loại Phòng</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="subject-table-body"></tbody>
                </table>
            </div>
            <div id="subject-pagination"></div>
        </div>

    </div>

    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-dialog">
            <div id="confirm-message" class="confirm-message"></div>
            <div class="confirm-actions">
                <button id="confirm-ok" class="btn-add">Xác nhận</button>
                <button id="confirm-cancel" class="btn-delete">Hủy</button>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const API = `${API_BASE}/monhoc`;
        let subjectData = [];
        let editingMa = null;
        let currentPage = 1;
        let searchKeyword = '';
        const PAGE_SIZE = 10;

        /* ── Pagination renderer ── */
        function renderPagination(total, current, containerId, fnName) {
            const el = document.getElementById(containerId);
            if (!el) return;
            const totalPages = Math.ceil(total / PAGE_SIZE);
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            let html = `<span class="pagination-info">Tổng ${total} mục</span>`;
            html += `<button class="page-btn" onclick="${fnName}(${current - 1})" ${current === 1 ? 'disabled' : ''}>&#8249;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= current - 2 && i <= current + 2)) {
                    html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="${fnName}(${i})">${i}</button>`;
                } else if (i === current - 3 || i === current + 3) {
                    html += `<span class="page-ellipsis">…</span>`;
                }
            }
            html += `<button class="page-btn" onclick="${fnName}(${current + 1})" ${current === totalPages ? 'disabled' : ''}>&#8250;</button>`;
            el.className = 'pagination';
            el.innerHTML = html;
        }

        function goToPage(n) { currentPage = n; renderSubjectTable(); }

        /* ── Search filter ── */
        function filterTable(keyword) {
            searchKeyword = keyword.toLowerCase();
            currentPage = 1;
            renderSubjectTable();
        }

        /* ── Loại phòng badge ── */
        function loaiPhongBadge(loai) {
            return loai === 'Phòng máy'
                ? `<span class="badge-warning">🖥 Phòng máy</span>`
                : `<span class="badge-info">📖 Lý thuyết</span>`;
        }

        /* ── Stat cards ── */
        function renderStats() {
            const total  = subjectData.length;
            const lt     = subjectData.filter(m => m.LoaiPhong === 'Lý thuyết').length;
            const th     = subjectData.filter(m => m.SoTietTH > 0).length;
            const pm     = subjectData.filter(m => m.LoaiPhong === 'Phòng máy').length;
            document.getElementById('subject-stats').innerHTML = [
                { icon: '📚', bg: 'stat-icon-blue',   val: total, lbl: 'Tổng môn học' },
                { icon: '📖', bg: 'stat-icon-green',  val: lt,    lbl: 'Môn lý thuyết' },
                { icon: '🧪', bg: 'stat-icon-purple', val: th,    lbl: 'Có thực hành' },
                { icon: '🖥', bg: 'stat-icon-amber',  val: pm,    lbl: 'Dùng phòng máy' },
            ].map(s => `
                <div class="stat-card">
                    <div class="stat-icon-wrap ${s.bg}">${s.icon}</div>
                    <div>
                        <div class="stat-value">${s.val}</div>
                        <div class="stat-label">${s.lbl}</div>
                    </div>
                </div>
            `).join('');
        }

        /* ── Render table with filter + pagination ── */
        function renderSubjectTable() {
            const tableBody = document.getElementById('subject-table-body');
            const filtered = searchKeyword
                ? subjectData.filter(mh =>
                    `${mh.MaMon} ${mh.TenMon} ${mh.LoaiPhong}`.toLowerCase().includes(searchKeyword))
                : subjectData;

            if (filtered.length === 0) {
                tableBody.innerHTML = `
                    <tr><td colspan="8" style="text-align:center;padding:32px;color:#9ca3af">
                        ${searchKeyword ? '🔍 Không tìm thấy kết quả phù hợp.' : 'Không có dữ liệu môn học.'}
                    </td></tr>`;
                document.getElementById('subject-pagination').innerHTML = '';
                return;
            }
            const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageData = filtered.slice(start, start + PAGE_SIZE);

            tableBody.innerHTML = pageData.map(mh => `
                <tr>
                    <td><strong>${mh.MaMon}</strong></td>
                    <td>${mh.TenMon}</td>
                    <td style="text-align:center">${mh.SoTinChi}</td>
                    <td style="text-align:center">${mh.TongSoTiet}</td>
                    <td style="text-align:center">${mh.SoTietLT}</td>
                    <td style="text-align:center">${mh.SoTietTH}</td>
                    <td>${loaiPhongBadge(mh.LoaiPhong)}</td>
                    <td>
                        <button onclick="editSubject('${mh.MaMon}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteSubject('${mh.MaMon}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
            renderPagination(filtered.length, currentPage, 'subject-pagination', 'goToPage');
        }

        async function loadSubjects() {
            try {
                const res = await fetch(`${API_BASE}/monhoc`);
                const data = await res.json();
                subjectData = data.map(row => ({
                    MaMon     : row.mamon,
                    TenMon    : row.tenmon,
                    SoTinChi  : row.sotinchi,
                    TongSoTiet: row.tongsotiet,
                    SoTietLT  : row.sotietlythuyet,
                    SoTietTH  : row.sotietthuchanh,
                    LoaiPhong : row.loaiphong
                }));
                currentPage = 1;
                renderSubjectTable();
                renderStats();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu môn học:', error);
            }
        }

        async function handleSubject() {
            const ten    = document.getElementById('tenMon').value;
            const tinChi = parseInt(document.getElementById('soTinChi').value) || 0;
            const tong   = parseInt(document.getElementById('tongSoTiet').value) || 0;
            const lt     = parseInt(document.getElementById('soTietLT').value) || 0;
            const th     = parseInt(document.getElementById('soTietTH').value) || 0;

            if (!ten) return alert('Vui lòng nhập tên môn học!');
            if (tinChi < 0 || tong < 0 || lt < 0 || th < 0)
                return alert('Các giá trị số không được là số âm!');

            const action = editingMa ? 'cập nhật' : 'thêm mới';
            if (!await confirmAction(`Bạn có chắc chắn muốn ${action} môn học này?`)) return;

            const body = {
                TenMon    : ten,
                SoTinChi  : tinChi,
                TongSoTiet: tong,
                SoTietLT  : lt,
                SoTietTH  : th,
                LoaiPhong : document.getElementById('loaiPhong').value,
            };

            try {
                const res = await fetch(editingMa ? `${API}/${editingMa}` : API, {
                    method : editingMa ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `API lỗi ${res.status}`);
                }
                const msg = editingMa ? 'Cập nhật môn học thành công.' : 'Thêm môn học thành công.';
                editingMa = null;
                document.getElementById('sub-btn').innerText = '+ Thêm Môn';
                document.getElementById('sub-btn').style.backgroundColor = '';
                resetForm();
                await loadSubjects();
                showNotification(msg);
            } catch (error) {
                alert(`Không thể lưu môn học: ${error.message}`);
            }
        }

        function showNotification(message, type = 'success') {
            const isErr = type === 'error';
            const n = document.getElementById('notification');
            n.className = `notification${isErr ? ' error' : ''}`;
            n.innerHTML = `
                <div class="toast-inner">
                    <div class="toast-icon ${isErr ? 'toast-icon-err' : 'toast-icon-ok'}">${isErr ? '✕' : '✓'}</div>
                    <div class="toast-body">
                        <div class="toast-title">${isErr ? 'Thất bại' : 'Thành công'}</div>
                        <div class="toast-msg">${message}</div>
                    </div>
                    <button class="toast-close" onclick="document.getElementById('notification').style.display='none'">×</button>
                </div>
                <div class="toast-bar"></div>`;
            n.style.display = 'block';
            clearTimeout(showNotification._t);
            showNotification._t = setTimeout(() => { n.style.display = 'none'; }, 3200);
        }

        function confirmAction(message) {
            const overlay   = document.getElementById('confirm-overlay');
            const messageEl = document.getElementById('confirm-message');
            const okBtn     = document.getElementById('confirm-ok');
            const cancelBtn = document.getElementById('confirm-cancel');
            messageEl.textContent = message;
            overlay.style.display = 'flex';
            return new Promise(resolve => {
                const cleanup  = () => { okBtn.removeEventListener('click', onOk); cancelBtn.removeEventListener('click', onCancel); };
                const onOk     = () => { cleanup(); overlay.style.display = 'none'; resolve(true); };
                const onCancel = () => { cleanup(); overlay.style.display = 'none'; resolve(false); };
                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
            });
        }

        function editSubject(ma) {
            const mh = subjectData.find(m => m.MaMon === ma);
            if (!mh) return alert('Không tìm thấy môn học cần sửa!');
            editingMa = ma;
            document.getElementById('maMon').value      = mh.MaMon;
            document.getElementById('tenMon').value     = mh.TenMon;
            document.getElementById('soTinChi').value   = mh.SoTinChi;
            document.getElementById('tongSoTiet').value = mh.TongSoTiet;
            document.getElementById('soTietLT').value   = mh.SoTietLT;
            document.getElementById('soTietTH').value   = mh.SoTietTH;
            document.getElementById('loaiPhong').value  = mh.LoaiPhong;
            const btn = document.getElementById('sub-btn');
            btn.innerText = '💾 Lưu cập nhật';
            btn.style.backgroundColor = '#2563eb';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteSubject(ma) {
            if (!await confirmAction('Bạn có chắc chắn muốn xóa môn học này?')) return;
            try {
                const res = await fetch(`${API}/${ma}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `API lỗi ${res.status}`);
                }
                if (editingMa === ma) { editingMa = null; resetForm(); }
                await loadSubjects();
                showNotification('Xóa môn học thành công.');
            } catch (error) {
                alert(`Không thể xóa môn học: ${error.message}`);
            }
        }

        function resetForm() {
            document.querySelectorAll('.input-group input:not(#maMon)').forEach(i => i.value = '');
            document.getElementById('maMon').value = 'Mã: Tự động';
        }

        window.addEventListener('DOMContentLoaded', loadSubjects);
    </script>
</body>
</html>
