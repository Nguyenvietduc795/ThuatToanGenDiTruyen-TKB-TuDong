<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Môn Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>DANH MỤC MÔN HỌC</h1>
        </header>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maMon" value="Mã: Tự động" readonly title="Mã môn tự sinh">
                <input type="text" id="tenMon" placeholder="Tên môn học">
                <input type="number" id="soTinChi"   placeholder="Số tín chỉ"  min="0">
                <input type="number" id="tongSoTiet" placeholder="Tổng tiết"   min="0">
                <input type="number" id="soTietLT"   placeholder="Lý thuyết"   min="0">
                <input type="number" id="soTietTH"   placeholder="Thực hành"   min="0">
                <select id="loaiPhong">
                    <option value="Lý thuyết">Lý thuyết</option>
                    <option value="Phòng máy">Phòng máy</option>
                </select>
                <button onclick="handleSubject()" class="btn-add" id="sub-btn">Thêm Môn</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã Môn</th>
                        <th>Tên Môn Học</th>
                        <th>Số Tín Chỉ</th>
                        <th>Tổng Tiết</th>
                        <th>Lý Thuyết</th>
                        <th>Thực Hành</th>
                        <th>Loại Phòng</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="subject-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api/monhoc';
        let data = [];
        let editingMa = null;

        async function loadData() {
            try {
                const res = await fetch(API);
                data = await res.json();
                renderTable();
            } catch {
                alert('Không kết nối được server. Hãy chạy: node server.js');
            }
        }

        function renderTable() {
            document.getElementById('subject-table-body').innerHTML = data.map(mh => `
                <tr>
                    <td><strong>${mh.MaMon}</strong></td>
                    <td>${mh.TenMon}</td>
                    <td>${mh.SoTinChi}</td>
                    <td>${mh.TongSoTiet}</td>
                    <td>${mh.SoTietLT}</td>
                    <td>${mh.SoTietTH}</td>
                    <td>${mh.LoaiPhong}</td>
                    <td>
                        <button onclick="editSubject('${mh.MaMon}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteSubject('${mh.MaMon}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function handleSubject() {
            const ten     = document.getElementById('tenMon').value;
            const tinChi  = parseInt(document.getElementById('soTinChi').value)   || 0;
            const tong    = parseInt(document.getElementById('tongSoTiet').value) || 0;
            const lt      = parseInt(document.getElementById('soTietLT').value)   || 0;
            const th      = parseInt(document.getElementById('soTietTH').value)   || 0;

            if (!ten) return alert('Vui lòng nhập tên môn học!');
            if (tinChi < 0 || tong < 0 || lt < 0 || th < 0)
                return alert('Các giá trị số không được là số âm!');

            const body = {
                TenMon    : ten,
                SoTinChi  : tinChi,
                TongSoTiet: tong,
                SoTietLT  : lt,
                SoTietTH  : th,
                LoaiPhong : document.getElementById('loaiPhong').value,
            };

            if (editingMa) {
                await fetch(`${API}/${editingMa}`, {
                    method : 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                editingMa = null;
                document.getElementById('sub-btn').innerText = 'Thêm Môn';
                document.getElementById('sub-btn').style.backgroundColor = '';
            } else {
                await fetch(API, {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
            }
            resetForm();
            loadData();
        }

        function editSubject(ma) {
            const mh = data.find(m => m.MaMon === ma);
            editingMa = ma;
            document.getElementById('maMon').value      = mh.MaMon;
            document.getElementById('tenMon').value     = mh.TenMon;
            document.getElementById('soTinChi').value   = mh.SoTinChi;
            document.getElementById('tongSoTiet').value = mh.TongSoTiet;
            document.getElementById('soTietLT').value   = mh.SoTietLT;
            document.getElementById('soTietTH').value   = mh.SoTietTH;
            document.getElementById('loaiPhong').value  = mh.LoaiPhong;

            const btn = document.getElementById('sub-btn');
            btn.innerText = 'Lưu cập nhật';
            btn.style.backgroundColor = '#3b82f6';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteSubject(ma) {
            if (!confirm('Xóa môn học này?')) return;
            await fetch(`${API}/${ma}`, { method: 'DELETE' });
            loadData();
        }

        function resetForm() {
            document.querySelectorAll('.input-group input:not(#maMon)').forEach(i => i.value = '');
            document.getElementById('maMon').value = 'Mã: Tự động';
        }

        loadData();
    </script>
</body>
</html>
