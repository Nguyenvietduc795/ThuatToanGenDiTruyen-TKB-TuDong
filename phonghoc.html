<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phòng Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>HỆ THỐNG QUẢN LÝ PHÒNG HỌC</h1>
        </header>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maPhong" value="Mã: Tự động" readonly title="Mã phòng tự sinh">
                <input type="text" id="tenPhong" placeholder="Tên Phòng (VD: Phong hoc 101)">
                <select id="loaiPhong">
                    <option value="Lý thuyết">Lý thuyết</option>
                    <option value="Phòng máy">Phòng máy</option>
                </select>
                <select id="trangThai">
                    <option value="Sẵn sàng">Sẵn sàng</option>
                    <option value="Đang sử dụng">Đang sử dụng</option>
                    <option value="Đang bảo trì">Đang bảo trì</option>
                </select>
                <button onclick="handleRoom()" class="btn-add" id="room-btn">Thêm Phòng</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã Phòng</th>
                        <th>Tên Phòng</th>
                        <th>Loại Phòng</th>
                        <th>Trạng Thái</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="room-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api/phonghoc';
        let data = [];
        let editingMa = null;

        async function loadData() {
            try {
                const res = await fetch(API);
                data = await res.json();
                renderTable();
            } catch {
                alert('Không kết nối được server. Hãy chạy: node server.js');
            }
        }

        function getStatusClass(status) {
            return status === 'Đang bảo trì' ? 'status-paused' : 'status-teaching';
        }

        function renderTable() {
            document.getElementById('room-table-body').innerHTML = data.map(p => `
                <tr>
                    <td><strong>${p.MaPhong}</strong></td>
                    <td>${p.TenPhong}</td>
                    <td>${p.LoaiPhong}</td>
                    <td><span class="status-tag ${getStatusClass(p.TrangThai)}">${p.TrangThai}</span></td>
                    <td>
                        <button onclick="editRoom('${p.MaPhong}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteRoom('${p.MaPhong}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function handleRoom() {
            const ten = document.getElementById('tenPhong').value;
            if (!ten) return alert('Vui lòng nhập tên phòng!');

            const body = {
                TenPhong : ten,
                LoaiPhong: document.getElementById('loaiPhong').value,
                TrangThai: document.getElementById('trangThai').value,
            };

            if (editingMa) {
                await fetch(`${API}/${editingMa}`, {
                    method : 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                editingMa = null;
                document.getElementById('room-btn').innerText = 'Thêm Phòng';
                document.getElementById('room-btn').style.backgroundColor = '';
            } else {
                await fetch(API, {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
            }
            resetForm();
            loadData();
        }

        function editRoom(ma) {
            const p = data.find(r => r.MaPhong === ma);
            editingMa = ma;
            document.getElementById('maPhong').value   = p.MaPhong;
            document.getElementById('tenPhong').value  = p.TenPhong;
            document.getElementById('loaiPhong').value = p.LoaiPhong;
            document.getElementById('trangThai').value = p.TrangThai;

            const btn = document.getElementById('room-btn');
            btn.innerText = 'Lưu cập nhật';
            btn.style.backgroundColor = '#3b82f6';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRoom(ma) {
            if (!confirm('Bạn có chắc chắn muốn xóa phòng này?')) return;
            await fetch(`${API}/${ma}`, { method: 'DELETE' });
            loadData();
        }

        function resetForm() {
            document.getElementById('tenPhong').value = '';
            document.getElementById('maPhong').value  = 'Mã: Tự động';
        }

        loadData();
    </script>
</body>
</html>
