<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phòng Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <h1>HỆ THỐNG QUẢN LÝ PHÒNG HỌC</h1>
        </header>

        <div id="notification" class="notification"></div>

        <section class="form-section">
            <div class="input-group">
                <input type="text" id="maPhong" value="Mã: Tự động" readonly title="Mã phòng tự sinh">
                <input type="text" id="tenPhong" placeholder="Tên Phòng (VD: Phong hoc 101)">
                <select id="loaiPhong">
                    <option value="Lý thuyết">Lý thuyết</option>
                    <option value="Phòng máy">Phòng máy</option>
                </select>
                <select id="trangThai">
                    <option value="Sẵn sàng">Sẵn sàng</option>
                    <option value="Đang sử dụng">Đang sử dụng</option>
                    <option value="Đang bảo trì">Đang bảo trì</option>
                </select>
                <button onclick="handleRoom()" class="btn-add" id="room-btn">Thêm Phòng</button>
            </div>
        </section>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mã Phòng</th>
                        <th>Tên Phòng</th>
                        <th>Loại Phòng</th>
                        <th>Trạng Thái</th>
                        <th style="width: 150px;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="room-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-dialog">
            <div id="confirm-message" class="confirm-message"></div>
            <div class="confirm-actions">
                <button id="confirm-ok" class="btn-add">OK</button>
                <button id="confirm-cancel" class="btn-delete">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const API = `${API_BASE}/phonghoc`;
        let roomData = [];
        let editingMa = null;

        function renderRoomTable() {
            document.getElementById('room-table-body').innerHTML = roomData.map(p => `
                <tr>
                    <td><strong>${p.MaPhong}</strong></td>
                    <td>${p.TenPhong}</td>
                    <td>${p.LoaiPhong}</td>
                    <td><span class="status-tag ${getStatusClass(p.TrangThai)}">${p.TrangThai}</span></td>
                    <td>
                        <button onclick="editRoom('${p.MaPhong}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteRoom('${p.MaPhong}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Sẵn sàng': return 'status-teaching';
                case 'Đang sử dụng': return 'status-teaching'; 
                case 'Đang bảo trì': return 'status-paused';
                default: return '';
            }
        }

        async function loadRooms() {
            try {
                const res = await fetch(`${API_BASE}/phonghoc`);
                const data = await res.json();
                roomData = data.map(row => ({
                    MaPhong: row.maphong,
                    TenPhong: row.tenphong,
                    LoaiPhong: row.loaiphong,
                    TrangThai: row.trangthai
                }));
                renderRoomTable();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu phòng học:', error);
            }
        }

        async function handleRoom() {
            const ten = document.getElementById('tenPhong').value;
            if (!ten) return alert('Vui lòng nhập tên phòng!');

            const action = editingMa ? 'cập nhật' : 'thêm mới';
            if (!await confirmAction(`Bạn có chắc chắn muốn ${action} phòng học này?`)) return;

            const body = {
                TenPhong : ten,
                LoaiPhong: document.getElementById('loaiPhong').value,
                TrangThai: document.getElementById('trangThai').value,
            };

            try {
                const res = await fetch(editingMa ? `${API}/${editingMa}` : API, {
                    method : editingMa ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                if (!res.ok) {
                    const error = await res.json().catch(() => ({}));
                    throw new Error(error.error || `API lỗi ${res.status}`);
                }

                const successMessage = editingMa ? 'Cập nhật phòng học thành công.' : 'Thêm phòng học thành công.';
                editingMa = null;
                document.getElementById('room-btn').innerText = 'Thêm Phòng';
                document.getElementById('room-btn').style.backgroundColor = '';
                resetForm();
                await loadRooms();
                showNotification(successMessage);
            } catch (error) {
                alert(`Không thể lưu phòng học: ${error.message}`);
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            clearTimeout(showNotification.timeout);
            showNotification.timeout = setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function confirmAction(message) {
            const overlay = document.getElementById('confirm-overlay');
            const messageEl = document.getElementById('confirm-message');
            const okBtn = document.getElementById('confirm-ok');
            const cancelBtn = document.getElementById('confirm-cancel');

            messageEl.textContent = message;
            overlay.style.display = 'flex';

            return new Promise(resolve => {
                const cleanup = () => {
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                };

                const onOk = () => {
                    cleanup();
                    overlay.style.display = 'none';
                    resolve(true);
                };

                const onCancel = () => {
                    cleanup();
                    overlay.style.display = 'none';
                    resolve(false);
                };

                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
            });
        }

        function editRoom(ma) {
            const p = roomData.find(r => r.MaPhong === ma);
            if (!p) return alert('Không tìm thấy phòng cần sửa!');
            editingMa = ma;
            document.getElementById('maPhong').value   = p.MaPhong;
            document.getElementById('tenPhong').value  = p.TenPhong;
            document.getElementById('loaiPhong').value = p.LoaiPhong;
            document.getElementById('trangThai').value = p.TrangThai;

            const btn = document.getElementById('room-btn');
            btn.innerText = 'Lưu cập nhật';
            btn.style.backgroundColor = '#3b82f6';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRoom(ma) {
            if (!await confirmAction('Bạn có chắc chắn muốn xóa phòng này?')) return;
            try {
                const res = await fetch(`${API}/${ma}`, { method: 'DELETE' });
                if (!res.ok) {
                    const error = await res.json().catch(() => ({}));
                    throw new Error(error.error || `API lỗi ${res.status}`);
                }
                if (editingMa === ma) {
                    editingMa = null;
                    resetForm();
                }
                await loadRooms();
                showNotification('Xóa phòng học thành công.');
            } catch (error) {
                alert(`Không thể xóa phòng học: ${error.message}`);
            }
        }

        function resetForm() {
            document.getElementById('tenPhong').value = '';
            document.getElementById('maPhong').value  = 'Mã: Tự động';
        }

        window.addEventListener('DOMContentLoaded', loadRooms);
    </script>
</body>
</html>
