<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phòng Học - DNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">

        <div class="page-header">
            <span class="page-header-icon">🏛</span>
            <div>
                <div class="page-title">QUẢN LÝ PHÒNG HỌC</div>
                <div class="page-subtitle">Quản lý phòng lý thuyết, phòng máy tính và trạng thái sử dụng</div>
            </div>
        </div>

        <div id="room-stats" class="stat-row"></div>

        <div id="notification" class="notification"></div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">✏️ Thêm mới / Chỉnh sửa phòng học</span>
            </div>
            <div class="form-section">
                <div class="input-group">
                    <input type="text" id="maPhong" value="Mã: Tự động" readonly title="Mã phòng tự sinh">
                    <input type="text" id="tenPhong" placeholder="Tên Phòng (VD: Phòng 101)">
                    <select id="loaiPhong">
                        <option value="Lý thuyết">Lý thuyết</option>
                        <option value="Phòng máy">Phòng máy</option>
                    </select>
                    <select id="trangThai">
                        <option value="Sẵn sàng">Sẵn sàng</option>
                        <option value="Đang sử dụng">Đang sử dụng</option>
                        <option value="Đang bảo trì">Đang bảo trì</option>
                    </select>
                    <button onclick="handleRoom()" class="btn-add" id="room-btn">+ Thêm Phòng</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">📋 Danh sách phòng học</span>
                <div class="table-search-wrap">
                    <input type="text" id="room-search" class="table-search-input"
                        placeholder="Tìm tên phòng, mã phòng..." oninput="filterTable(this.value)">
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Mã Phòng</th>
                            <th>Tên Phòng</th>
                            <th>Loại Phòng</th>
                            <th>Trạng Thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="room-table-body"></tbody>
                </table>
            </div>
            <div id="room-pagination"></div>
        </div>

    </div>

    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-dialog">
            <div id="confirm-message" class="confirm-message"></div>
            <div class="confirm-actions">
                <button id="confirm-ok" class="btn-add">Xác nhận</button>
                <button id="confirm-cancel" class="btn-delete">Hủy</button>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const API = `${API_BASE}/phonghoc`;
        let roomData = [];
        let editingMa = null;
        let currentPage = 1;
        let searchKeyword = '';
        const PAGE_SIZE = 10;

        /* ── Pagination renderer ── */
        function renderPagination(total, current, containerId, fnName) {
            const el = document.getElementById(containerId);
            if (!el) return;
            const totalPages = Math.ceil(total / PAGE_SIZE);
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            let html = `<span class="pagination-info">Tổng ${total} mục</span>`;
            html += `<button class="page-btn" onclick="${fnName}(${current - 1})" ${current === 1 ? 'disabled' : ''}>&#8249;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= current - 2 && i <= current + 2)) {
                    html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="${fnName}(${i})">${i}</button>`;
                } else if (i === current - 3 || i === current + 3) {
                    html += `<span class="page-ellipsis">…</span>`;
                }
            }
            html += `<button class="page-btn" onclick="${fnName}(${current + 1})" ${current === totalPages ? 'disabled' : ''}>&#8250;</button>`;
            el.className = 'pagination';
            el.innerHTML = html;
        }

        function goToPage(n) { currentPage = n; renderRoomTable(); }

        /* ── Search filter ── */
        function filterTable(keyword) {
            searchKeyword = keyword.toLowerCase();
            currentPage = 1;
            renderRoomTable();
        }

        /* ── Status class mapping ── */
        function getStatusClass(status) {
            switch(status) {
                case 'Sẵn sàng':     return 'status-ready';
                case 'Đang sử dụng': return 'status-busy';
                case 'Đang bảo trì': return 'status-maintenance';
                default: return '';
            }
        }

        /* ── Loại phòng badge ── */
        function loaiPhongBadge(loai) {
            return loai === 'Phòng máy'
                ? `<span class="badge-warning">🖥 Phòng máy</span>`
                : `<span class="badge-info">📖 Lý thuyết</span>`;
        }

        /* ── Stat cards ── */
        function renderStats() {
            const total    = roomData.length;
            const ltCount  = roomData.filter(r => r.LoaiPhong === 'Lý thuyết').length;
            const pmCount  = roomData.filter(r => r.LoaiPhong === 'Phòng máy').length;
            const baoTri   = roomData.filter(r => r.TrangThai === 'Đang bảo trì').length;
            document.getElementById('room-stats').innerHTML = [
                { icon: '🏛',  bg: 'stat-icon-blue',   val: total,   lbl: 'Tổng phòng học' },
                { icon: '📖',  bg: 'stat-icon-green',  val: ltCount, lbl: 'Phòng lý thuyết' },
                { icon: '🖥',  bg: 'stat-icon-amber',  val: pmCount, lbl: 'Phòng máy tính' },
                { icon: '🔧',  bg: 'stat-icon-red',    val: baoTri,  lbl: 'Đang bảo trì' },
            ].map(s => `
                <div class="stat-card">
                    <div class="stat-icon-wrap ${s.bg}">${s.icon}</div>
                    <div>
                        <div class="stat-value">${s.val}</div>
                        <div class="stat-label">${s.lbl}</div>
                    </div>
                </div>
            `).join('');
        }

        /* ── Render table with filter + pagination ── */
        function renderRoomTable() {
            const tableBody = document.getElementById('room-table-body');
            const filtered = searchKeyword
                ? roomData.filter(p =>
                    `${p.MaPhong} ${p.TenPhong} ${p.LoaiPhong} ${p.TrangThai}`.toLowerCase().includes(searchKeyword))
                : roomData;

            if (filtered.length === 0) {
                tableBody.innerHTML = `
                    <tr><td colspan="5" style="text-align:center;padding:32px;color:#9ca3af">
                        ${searchKeyword ? '🔍 Không tìm thấy kết quả phù hợp.' : 'Không có dữ liệu phòng học.'}
                    </td></tr>`;
                document.getElementById('room-pagination').innerHTML = '';
                return;
            }
            const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageData = filtered.slice(start, start + PAGE_SIZE);

            tableBody.innerHTML = pageData.map(p => `
                <tr>
                    <td><strong>${p.MaPhong}</strong></td>
                    <td>${p.TenPhong}</td>
                    <td>${loaiPhongBadge(p.LoaiPhong)}</td>
                    <td><span class="status-tag ${getStatusClass(p.TrangThai)}">${p.TrangThai}</span></td>
                    <td>
                        <button onclick="editRoom('${p.MaPhong}')" class="btn-edit">Sửa</button>
                        <button onclick="deleteRoom('${p.MaPhong}')" class="btn-delete">Xóa</button>
                    </td>
                </tr>
            `).join('');
            renderPagination(filtered.length, currentPage, 'room-pagination', 'goToPage');
        }

        async function loadRooms() {
            try {
                const res = await fetch(`${API_BASE}/phonghoc`);
                const data = await res.json();
                roomData = data.map(row => ({
                    MaPhong : row.maphong,
                    TenPhong: row.tenphong,
                    LoaiPhong: row.loaiphong,
                    TrangThai: row.trangthai
                }));
                currentPage = 1;
                renderRoomTable();
                renderStats();
            } catch (error) {
                console.error('Lỗi khi tải dữ liệu phòng học:', error);
            }
        }

        async function handleRoom() {
            const ten = document.getElementById('tenPhong').value;
            if (!ten) return alert('Vui lòng nhập tên phòng!');

            const action = editingMa ? 'cập nhật' : 'thêm mới';
            if (!await confirmAction(`Bạn có chắc chắn muốn ${action} phòng học này?`)) return;

            const body = {
                TenPhong : ten,
                LoaiPhong: document.getElementById('loaiPhong').value,
                TrangThai: document.getElementById('trangThai').value,
            };

            try {
                const res = await fetch(editingMa ? `${API}/${editingMa}` : API, {
                    method : editingMa ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(body),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `API lỗi ${res.status}`);
                }
                const msg = editingMa ? 'Cập nhật phòng học thành công.' : 'Thêm phòng học thành công.';
                editingMa = null;
                document.getElementById('room-btn').innerText = '+ Thêm Phòng';
                document.getElementById('room-btn').style.backgroundColor = '';
                resetForm();
                await loadRooms();
                showNotification(msg);
            } catch (error) {
                alert(`Không thể lưu phòng học: ${error.message}`);
            }
        }

        function showNotification(message, type = 'success') {
            const isErr = type === 'error';
            const n = document.getElementById('notification');
            n.className = `notification${isErr ? ' error' : ''}`;
            n.innerHTML = `
                <div class="toast-inner">
                    <div class="toast-icon ${isErr ? 'toast-icon-err' : 'toast-icon-ok'}">${isErr ? '✕' : '✓'}</div>
                    <div class="toast-body">
                        <div class="toast-title">${isErr ? 'Thất bại' : 'Thành công'}</div>
                        <div class="toast-msg">${message}</div>
                    </div>
                    <button class="toast-close" onclick="document.getElementById('notification').style.display='none'">×</button>
                </div>
                <div class="toast-bar"></div>`;
            n.style.display = 'block';
            clearTimeout(showNotification._t);
            showNotification._t = setTimeout(() => { n.style.display = 'none'; }, 3200);
        }

        function confirmAction(message) {
            const overlay   = document.getElementById('confirm-overlay');
            const messageEl = document.getElementById('confirm-message');
            const okBtn     = document.getElementById('confirm-ok');
            const cancelBtn = document.getElementById('confirm-cancel');
            messageEl.textContent = message;
            overlay.style.display = 'flex';
            return new Promise(resolve => {
                const cleanup  = () => { okBtn.removeEventListener('click', onOk); cancelBtn.removeEventListener('click', onCancel); };
                const onOk     = () => { cleanup(); overlay.style.display = 'none'; resolve(true); };
                const onCancel = () => { cleanup(); overlay.style.display = 'none'; resolve(false); };
                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
            });
        }

        function editRoom(ma) {
            const p = roomData.find(r => r.MaPhong === ma);
            if (!p) return alert('Không tìm thấy phòng cần sửa!');
            editingMa = ma;
            document.getElementById('maPhong').value   = p.MaPhong;
            document.getElementById('tenPhong').value  = p.TenPhong;
            document.getElementById('loaiPhong').value = p.LoaiPhong;
            document.getElementById('trangThai').value = p.TrangThai;
            const btn = document.getElementById('room-btn');
            btn.innerText = '💾 Lưu cập nhật';
            btn.style.backgroundColor = '#2563eb';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRoom(ma) {
            if (!await confirmAction('Bạn có chắc chắn muốn xóa phòng này?')) return;
            try {
                const res = await fetch(`${API}/${ma}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `API lỗi ${res.status}`);
                }
                if (editingMa === ma) { editingMa = null; resetForm(); }
                await loadRooms();
                showNotification('Xóa phòng học thành công.');
            } catch (error) {
                alert(`Không thể xóa phòng học: ${error.message}`);
            }
        }

        function resetForm() {
            document.getElementById('tenPhong').value = '';
            document.getElementById('maPhong').value  = 'Mã: Tự động';
        }

        window.addEventListener('DOMContentLoaded', loadRooms);
    </script>
</body>
</html>
